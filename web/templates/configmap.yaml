{{- if .Values.global.web.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "web.fullname" . }}
  labels:
    {{- include "web.labels" . | nindent 4 }}
data:
  web.yaml: |
    version: "1.27"
    listeners:
      - port: {{ .Values.global.web.service.port }}
    hosts: {{- if and (not .Values.global.smtpd.enabled) (not .Values.global.rated.enabled) }} []{{- end }}
      {{- if .Values.global.smtpd.enabled }}
      - address: "{{ .Release.Name }}-smtpd-api.{{ .Release.Namespace }}.svc.cluster.local"
        port: {{ .Values.global.smtpd.api.service.port }}
        kubernetes:
          namespace: {{ .Release.Namespace }}
          name: {{ .Release.Name }}-smtpd
        processes:
          - smtpd
      {{- end }}
      {{- if .Values.global.rated.enabled }}
      - address: "{{ .Release.Name }}-rated-api.{{ .Release.Namespace }}.svc.cluster.local"
        port: {{ .Values.global.rated.api.service.port }}
        expand: true
        processes:
          - rated
      {{- end }}
    reresolve: 5
    users: {{ toYaml .Values.users | nindent 6 }}
    environment:
      privdrop:
        user: web
        group: web
    {{- if .Values.global.elasticsearch.enabled }}
    elasticsearch:
      index:
        history: "halon-transactions"
        policyd: "halon-policyd-actions"
      nodes:
        - url: {{ .Values.global.elasticsearch.url }}
      tls:
        rejectUnauthorized: false
      {{- if .Values.global.elasticsearch.auth }}
      auth: {{ toYaml .Values.global.elasticsearch.auth | nindent 8 }}
      {{- end }}
    {{- end }}
    {{- if .Values.global.policyd.enabled }}
    policyd:
      address: "{{ .Release.Name }}-policyd.{{ .Release.Namespace }}.svc.cluster.local"
      port: {{ .Values.global.policyd.service.port }}
    {{- end }}
  web-history.yaml: |
    version: "1.27"
    mappings:
      transaction:
        id: _id
      timestamp:
        id: receivedtime
      aggregations:
        timestamp:
          id: receivedtime
      fields:
        - id: transactionid
          label: Transaction ID
        - id: queueid
          label: Queue ID
        - id: senderhelo
          label: Sender HELO
        - id: action
          label: Action
          type: keyword
          sortable: true
          values:
            - value: DELIVER
              color: "#00b300"
              textColor: "fff"
              format: badge
            - value: QUARANTINE
              color: "#ffbf00"
              textColor: "000"
              format: badge
            - value: REJECT
              color: "#f20d0d"
              textColor: "fff"
              format: badge
            - value: QUEUE
              color: "#3d3df5"
              textColor: "fff"
              format: badge
            - value: DEFER
              color: "#ffbf00"
              textColor: "000"
              format: badge
            - value: DELETE
              color: "#000"
              textColor: "fff"
              format: badge
            - value: BOUNCE
              color: "#f20d0d"
              textColor: "fff"
              format: badge
        - id: receivedtime
          label: Received At
          type: date
          sortable: true
        - id: finishedtime
          label: Finished At
          type: date
          sortable: true
        - id: reason
          label: Reason
          type: keyword
        - id: authusername
          label: Auth Username
          type: keyword
        - id: hostname
          label: Host
          type: keyword
        - id: serverid
          label: Server ID
          type: keyword
        - id: localip
          label: Local IP
          type: ip
          policy:
            field: localips
        - id: remoteip
          label: Sender IP
          type: ip
          sortable: true
        - id: sender
          label: Sender
          type: keyword
          sortable: true
        - id: senderdomain
          label: Sender Domain
          type: keyword
          sortable: true
        - id: recipient
          label: Recipient
          type: keyword
          sortable: true
        - id: recipientdomain
          label: Recipient Domain
          type: keyword
          sortable: true
          policy:
            field: recipientdomain
        - id: transportid
          label: Transport ID
          type: keyword
          sortable: true
          policy:
            field: transportid
        - id: subject
          label: Subject
          type: keyword
          sortable: true
        - id: size
          label: Message Size (bytes)
          sortable: true
        - id: metadata.as_score
          label: Anti-Spam Score
        - id: metadata.as_id
          label: Anti-Spam ID
        - id: metadata.av_score
          label: Anti-Virus Score
        - id: metadata
          label: Metadata
        - id: queue.retry
          label: Queue Retries
        - id: queue.errorcode
          label: Error Code
          sortable: true
        - id: queue.duration
          label: Transfer Time
          sortable: true
        - id: queue.totalduration
          label: Time in Queue
          sortable: true
        - id: queue.localip
          label: Source IP
        - id: queue.remoteip
          label: Remote IP
          policy:
            field: remoteip
        - id: queue.remotemx
          label: Remote MX
          sortable: true
          policy:
            field: remoteip
        - id: queue.smtpcode
          label: SMTP Code
          sortable: true
        - id: grouping
          label: Grouping
          type: keyword
          sortable: true
          policy:
            field: grouping
        - id: jobid
          label: Job ID
          type: keyword
          sortable: true
          policy:
            field: jobid
        - id: tenantid
          label: Tenant ID
          type: keyword
          sortable: true
          policy:
            field: tenantid
    components:
      preview:
        layout:
          - label: Transaction
            column: 1
            type: fields
            fields:
              - id: action
              - id: receivedtime
              - id: hostname
              - id: transactionid
              - id: queueid
              - id: serverid
              - id: senderhelo
              - id: localip
              - id: remoteip
              - id: remoteptr
              - id: authusername
              - id: sender
              - id: recipient
              - id: subject
              - id: size
              - id: reason
          - label: Scores
            column: 1
            type: fields
            fields:
              - id: metadata.as_score
              - id: metadata.as_id
              - id: metadata.av_score
          - label: Queue
            column: 2
            type: fields
            fields:
              - id: transportid
              - id: queue.localip
              - id: queue.remoteip
              - id: queue.remotemx
              - id: jobid
              - id: tenantid
              - id: grouping
              - id: queue.retry
              - id: queue.errorcode
              - id: queue.smtpcode
              - id: queue.duration
              - id: queue.totalduration
          - label: Metadata
            column: 1
            type: fields
            fields:
              - id: metadata
                label: metadata
          - type: headers
            label: Headers
            column: 2
          - type: message
            label: Preview
            column: 2
      history:
        chart:
          id: history timeseries
        views:
          - label: Default
            sort:
              default:
                field: receivedtime
                direction: desc
            fields:
              - id: action
                column:
                  width: 120
              - id: receivedtime
              - id: remoteip
              - id: sender
              - id: recipient
              - id: subject
              - id: reason
      statistics:
        views:
          - id: default
            label: Default
            charts:
              - id: totalmessages sparkline
                properties:
                  grid:
                    h: 3
                    w: 4
              - id: delivered sparkline
                properties:
                  grid:
                    h: 3
                    w: 4
              - id: rejected sparkline
                properties:
                  grid:
                    h: 3
                    w: 4
              - id: failures sparkline
                properties:
                  grid:
                    h: 3
                    w: 4
              - id: average transfer time sparkline
                properties:
                  grid:
                    h: 3
                    w: 4
              - id: queued
                properties:
                  grid:
                    h: 3
                    w: 2
              - id: average message size
                properties:
                  grid:
                    h: 3
                    w: 2
              - id: action timeline
              - id: message size timeline
              - id: action pie
              - id: top recipient domains
              - id: top sender domains
              - id: top sender ip
              - id: top blocked senders
              - id: top hostname
              - id: top error messages
              - id: top blocked viruses
              - id: top spam scores
                properties:
                  filters:
                    - field: metadata.av_score
                      value: 0
                      operator: is_not
              - id: top sa rules
        colors:
          palette:
            - "#3333ff"
            - "#f20d0d"
            - "#00b300"
            - "#ffbf00"
            - "#8066f5"
            - "#f060b7"
          values:
            "QUEUE": "#3d3df5"
            "DELIVER": "#00b300"
            "REJECT": "#f20d0d"
            "DEFER": "#ffbf00"
            "BOUNCE": "#f20d0d"
            "QUARANTINE": "#ffbf00"
            "DELETE": "#000"
        charts:
          # Area charts
          - id: action timeline
            label: Action Timeline
            type: area
            splitSeries: true
            formatter:
              xaxis:
                type: date
              yaxis:
                type: metric
              label:
                type: date
            area:
              stacked: true
            query: >
              {
                "aggs": {
                  "0": {
                    "date_histogram": {
                      "field": "receivedtime"
                    },
                    "aggs": {
                      "1": {
                        "terms": {
                          "field": "action.keyword",
                          "size": 10
                        }
                      }
                    }
                  }
                }
              }
          - id: message size timeline
            label: Message Size Timeline
            type: area
            formatter:
              xaxis:
                type: date
              yaxis:
                type: metric
              label:
                type: date
            query: >
              {
                "aggs": {
                  "0": {
                    "date_histogram": {
                      "field": "receivedtime"
                    },
                    "aggs": {
                      "1": {
                        "sum": {
                          "field": "size"
                        }
                      }
                    }
                  }
                }
              }
          # Pie charts
          - id: action pie
            label: Number Of Actions
            type: pie
            query: >
              {
                "aggs": {
                  "1": {
                    "terms": {
                      "field": "action.keyword",
                      "size": 10
                    }
                  }
                }
              }
          # Bar charts
          - id: top blocked viruses
            label: Blocked Virues
            type: bar
            query: >
              {
                "aggs": {
                  "1": {
                    "terms": {
                      "field": "metadata.av_score.keyword",
                      "order": {
                        "_count": "desc"
                      },
                      "size": 10
                    }
                  }
                }
              }
          - id: top spam scores
            label: Spam Scores
            type: bar
            query: >
              {
                "aggs": {
                  "1": {
                    "terms": {
                      "field": "metadata.as_score",
                      "order": {
                        "_count": "desc"
                      },
                      "size": 10
                    }
                  }
                }
              }
          # Table charts
          - id: top recipient domains
            label: Recipient Domains
            type: table
            splitSeries: true
            query: >
              {
                "aggs": {
                  "0": {
                    "terms": {
                      "field": "recipientdomain.keyword",
                      "order": {
                        "_count": "desc"
                      },
                      "size": 10
                    },
                    "aggs": {
                      "1": {
                        "terms": {
                          "field": "action.keyword",
                          "order": {
                            "_count": "desc"
                          },
                          "size": 10
                        }
                      }
                    }
                  }
                }
              }
          - id: top sender domains
            label: Sender Domains
            type: table
            splitSeries: true
            query: >
              {
                "aggs": {
                  "0": {
                    "terms": {
                      "field": "senderdomain.keyword",
                      "order": {
                        "_count": "desc"
                      },
                      "size": 10
                    },
                    "aggs": {
                      "1": {
                        "terms": {
                          "field": "action.keyword",
                          "order": {
                            "_count": "desc"
                          },
                          "size": 10
                        }
                      }
                    }
                  }
                }
              }
          - id: top sender ip
            label: Sender IP's
            type: table
            splitSeries: true
            query: >
              {
                "aggs": {
                  "0": {
                    "terms": {
                      "field": "remoteip",
                      "order": {
                        "_count": "desc"
                      },
                      "size": 10
                    },
                    "aggs": {
                      "1": {
                        "terms": {
                          "field": "action.keyword",
                          "order": {
                            "_count": "desc"
                          },
                          "size": 10
                        }
                      }
                    }
                  }
                }
              }
          - id: top hostname
            label: Local Hostnames
            type: table
            splitSeries: true
            query: >
              {
                "aggs": {
                  "0": {
                    "terms": {
                      "field": "hostname.keyword",
                      "order": {
                        "_count": "desc"
                      },
                      "size": 10
                    },
                    "aggs": {
                      "1": {
                        "terms": {
                          "field": "action.keyword",
                          "order": {
                            "_count": "desc"
                          },
                          "size": 10
                        }
                      }
                    }
                  }
                }
              }
          - id: top reason messages
            label: Reason Messages
            type: table
            query: >
              {
                "aggs": {
                  "0": {
                    "terms": {
                      "field": "reason.keyword",
                      "order": {
                        "_count": "desc"
                      },
                      "size": 10
                    }
                  }
                }
              }
          - id: top blocked senders
            label: Blocked Senders
            type: table
            query: >
              {
                "aggs": {
                  "0": {
                    "terms": {
                      "field": "sender.keyword",
                      "order": {
                        "1": "desc"
                      },
                      "size": 10
                    },
                    "aggs": {
                      "1": {
                        "filter": {
                          "bool": {
                            "filter": [
                              {
                                "bool": {
                                  "should": [
                                    {
                                      "bool": {
                                        "should": [
                                          {
                                            "match_phrase": {
                                              "action.keyword": "QUARANTINE"
                                            }
                                          }
                                        ],
                                        "minimum_should_match": 1
                                      }
                                    },
                                    {
                                      "bool": {
                                        "should": [
                                          {
                                            "match_phrase": {
                                              "action.keyword": "REJECT"
                                            }
                                          }
                                        ],
                                        "minimum_should_match": 1
                                      }
                                    }
                                  ],
                                  "minimum_should_match": 1
                                }
                              }
                            ]
                          }
                        }
                      }
                    }
                  }
                }
              }
          # Metric charts
          - id: totalmessages sparkline
            label: Total Messages
            type: metric
            path:
              agg: docs
              bucket: all.doc_count
            metric:
              sparkline:
                type: line
                path:
                  agg: sparkline
                  bucket: doc_count
            colors:
              palette:
                - "blue"
            query: >
              {
                "aggs": {
                  "docs": {
                    "filters": {
                      "filters": {
                        "all": {
                          "match_all": {}
                        }
                      }
                    }
                  },
                  "sparkline": {
                    "date_histogram": {
                      "field": "receivedtime"
                    }
                  }
                }
              }
          - id: delivered sparkline
            label: Delivered Messages
            type: metric
            path:
              agg: docs
              bucket: all.delivered.doc_count
            metric:
              sparkline:
                type: line
                path:
                  agg: sparkline
                  bucket: delivered.doc_count
            colors:
              palette:
                - "green"
            query: >
              {
                "aggs": {
                  "docs": {
                    "filters": {
                      "filters": {
                        "all": {
                          "match_all": {}
                        }
                      }
                    },
                    "aggs": {
                      "delivered": {
                        "filter": {
                          "terms": {
                            "action.keyword": [
                              "DELIVER"
                            ]
                          }
                        }
                      }
                    }
                  },
                  "sparkline": {
                    "date_histogram": {
                      "field": "receivedtime"
                    },
                    "aggs": {
                      "delivered": {
                        "filter": {
                          "term": {
                            "action.keyword": "DELIVER"
                          }
                        }
                      }
                    }
                  }
                }
              }
          - id: rejected sparkline
            label: Rejected Messages
            type: metric
            colors:
              palette:
                - "red"
            path:
              agg: rejected
              bucket: doc_count
            metric:
              sparkline:
                type: line
                path:
                  agg: sparkline
                  bucket: rejected.doc_count
            query: >
              {
                "aggs": {
                  "rejected": {
                    "filter": {
                      "terms": {
                        "action.keyword": [
                          "REJECT",
                          "QUARANTINE"
                        ]
                      }
                    }
                  },
                  "sparkline": {
                    "date_histogram": {
                      "field": "receivedtime"
                    },
                    "aggs": {
                      "rejected": {
                        "filter": {
                          "terms": {
                            "action.keyword": [
                              "REJECT",
                              "QUARANTINE"
                            ]
                          }
                        }
                      }
                    }
                  }
                }
              }
          - id: average transfer time sparkline
            label: Average Transfer Time (seconds)
            type: metric
            colors:
              palette:
                - "blue"
            path:
              agg: transfertime
              bucket: count
            metric:
              sparkline:
                type: line
                path:
                  agg: sparkline
                  bucket: transfertime.value
            query: >
              {
                "aggs": {
                  "transfertime": {
                    "avg": {
                      "field": "queue.duration"
                    }
                  },
                  "sparkline": {
                    "date_histogram": {
                      "field": "receivedtime"
                    },
                    "aggs": {
                      "transfertime": {
                        "avg": {
                          "field": "queue.duration"
                        }
                      }
                    }
                  }
                }
              }
          - id: failures sparkline
            label: Delivery Failures
            type: metric
            colors:
              palette:
                - "yellow"
            formatter:
              label:
                type: percentage
            path:
              agg: all_docs
              bucket: all.sum_failure_rate.value
            metric:
              sparkline:
                type: line
                path:
                  agg: sparkline
                  bucket: sum_failure_rate.value
            query: >
              {
                "aggs": {
                  "all_docs": {
                    "filters": {
                      "filters": {
                        "all": {
                          "match_all": {}
                        }
                      }
                    },
                    "aggs": {
                      "failed": {
                        "filter": {
                          "terms": {
                            "action.keyword": [
                              "BOUNCE",
                              "DELETE"
                            ]
                          }
                        }
                      },
                      "sum_failure_rate": {
                        "bucket_script": {
                          "buckets_path": {
                            "failed": "failed > _count",
                            "total": "_count"
                          },
                          "script": "(params.failed / params.total)",
                          "format": "0.0%"
                        }
                      }
                    }
                  },
                  "sparkline": {
                    "date_histogram": {
                      "field": "receivedtime"
                    },
                    "aggs": {
                      "failed": {
                        "filter": {
                          "terms": {
                            "action.keyword": [
                              "BOUNCE",
                              "DELETE"
                            ]
                          }
                        }
                      },
                      "sum_failure_rate": {
                        "bucket_script": {
                          "buckets_path": {
                            "failed": "failed > _count",
                            "total": "_count"
                          },
                          "script": "(params.failed / params.total)",
                          "format": "0.0%"
                        }
                      }
                    }
                  }
                }
              }
          # Label charts
          - id: average transfer time
            label: Average Transfer Time (seconds)
            type: label
            colors:
              palette:
                - "blue"
            query: >
              {
                "aggs": {
                  "0": {
                    "avg": {
                      "field": "queue.duration"
                    }
                  }
                }
              }
          - id: average message size
            label: Average Message Size (bytes)
            type: label
            colors:
              palette:
                - "blue"
            formatter:
              label:
                type: metric
            query: >
              {
                "aggs": {
                  "0": {
                    "avg": {
                      "field": "size"
                    }
                  }
                }
              }
          - id: delivered
            label: Delivered Messages
            type: label
            colors:
              palette:
                - "green"
            query: >
              {
                "aggs": {
                  "0": {
                    "filter": {
                      "terms": {
                        "action.keyword": [
                          "DELIVER"
                        ]
                      }
                    }
                  }
                }
              }
          - id: queued
            label: Queued Messages
            type: label
            colors:
              palette:
                - "blue"
            query: >
              {
                "aggs": {
                  "0": {
                    "filter": {
                      "terms": {
                        "action.keyword": [
                          "QUEUE"
                        ]
                      }
                    }
                  }
                }
              }
          - id: rejected
            label: Rejected Messages
            type: label
            colors:
              palette:
                - "red"
            query: >
              {
                "aggs": {
                  "0": {
                    "filter": {
                      "terms": {
                        "action.keyword": [
                          "REJECT",
                          "QUARANTINE"
                        ]
                      }
                    }
                  }
                }
              }
          - id: deferred
            label: Deferred Messages
            type: label
            colors:
              palette:
                - "yellow"
            query: >
              {
                "aggs": {
                  "0": {
                    "filter": {
                      "terms": {
                        "action.keyword": [
                          "DEFER"
                        ]
                      }
                    }
                  }
                }
              }
          - id: failures
            label: Delivery Failures
            type: label
            colors:
              palette:
                - "yellow"
            query: >
              {
                "aggs": {
                  "0": {
                    "filter": {
                      "terms": {
                        "action.keyword": [
                          "BOUNCE",
                          "DELETE"
                        ]
                      }
                    }
                  }
                }
              }
          - id: history timeseries
            label: History
            type: bar
            splitSeries: true
            trackTotalHits: true
            formatter:
              xaxis:
                type: date
              yaxis:
                type: metric
              label:
                type: date
            chart:
              stacked: true
            query: >
              {
                "aggs": {
                  "0": {
                    "date_histogram": {
                      "field": "receivedtime"
                    },
                    "aggs": {
                      "1": {
                        "terms": {
                          "field": "action.keyword",
                          "size": 10
                        }
                      }
                    }
                  }
                }
              }
{{- end }}