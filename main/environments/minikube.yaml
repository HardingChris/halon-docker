# Local development overrides for Minikube.
# This file is intended for use with deployscripts/install-minikube.sh.
# Images are expected to be available locally and loaded into Minikube.

global:
  elasticsearch:
    enabled: true
    url: https://elasticsearch-es-default.elastic-stack.svc.cluster.local:9200

clusterd:
  image:
    repository: halon/clusterd
    pullPolicy: IfNotPresent

policyd:
  image:
    repository: halon/policyd
    pullPolicy: IfNotPresent

dlpd:
  image:
    repository: halon/dlpd
    pullPolicy: IfNotPresent

rated:
  image:
    repository: halon/rated
    pullPolicy: IfNotPresent
  api:
    image:
      repository: halon/api
      pullPolicy: IfNotPresent

sasid:
  image:
    repository: halon/sasid
    pullPolicy: IfNotPresent

savdid:
  image:
    repository: halon/savdid
    pullPolicy: IfNotPresent

expurgate:
  image:
    repository: halon/expurgate
    pullPolicy: IfNotPresent

smtpd:
  image:
    repository: halon/smtpd
    pullPolicy: IfNotPresent
  api:
    image:
      repository: halon/api
      pullPolicy: IfNotPresent

web:
  image:
    repository: halon/web
    pullPolicy: IfNotPresent
  users:
    - username: admin
      password: $2a$12$f0IGaULumWgwwBJc2U8BdOa/cgKRPipK9fHyE5PI0BzLmicxJl3Eq #update with bcrypt hash of admin PW: htpasswd -bnBC "" 'YourNewPassword' | tr -d ':\n'

classifier:
  image:
    repository: halon/bounce-classifier
    pullPolicy: IfNotPresent