# Shared AKS test environment overrides.
# This file is intended for use with deployscripts/install-aks.sh.
# AKS deployments in this repo use a single ACR.

clusterd:
  image:
    repository: apprelaypoccontreg.azurecr.io/halon/clusterd
    pullPolicy: IfNotPresent

policyd:
  image:
    repository: apprelaypoccontreg.azurecr.io/halon/policyd
    pullPolicy: IfNotPresent

dlpd:
  image:
    repository: apprelaypoccontreg.azurecr.io/halon/dlpd
    pullPolicy: IfNotPresent

rated:
  image:
    repository: apprelaypoccontreg.azurecr.io/halon/rated
    pullPolicy: IfNotPresent
  api:
    image:
      repository: apprelaypoccontreg.azurecr.io/halon/api
      pullPolicy: IfNotPresent

sasid:
  image:
    repository: apprelaypoccontreg.azurecr.io/halon/sasid
    pullPolicy: IfNotPresent

savdid:
  image:
    repository: apprelaypoccontreg.azurecr.io/halon/savdid
    pullPolicy: IfNotPresent

expurgate:
  image:
    repository: apprelaypoccontreg.azurecr.io/halon/expurgate
    pullPolicy: IfNotPresent

smtpd:
  image:
    repository: apprelaypoccontreg.azurecr.io/halon/smtpd
    pullPolicy: IfNotPresent
  api:
    image:
      repository: apprelaypoccontreg.azurecr.io/halon/api
      pullPolicy: IfNotPresent

web:
  image:
    repository: apprelaypoccontreg.azurecr.io/halon/web
    pullPolicy: IfNotPresent
  users:
    - username: admin
      password: $2a$12$f0IGaULumWgwwBJc2U8BdOa/cgKRPipK9fHyE5PI0BzLmicxJl3Eq #update with bcrypt hash of admin PW: htpasswd -bnBC "" 'YourNewPassword' | tr -d ':\n'

classifier:
  image:
    repository: apprelaypoccontreg.azurecr.io/halon/bounce-classifier
    pullPolicy: IfNotPresent

# overrides for the smtpd and web services to make them available via load balancer in private VNET:
global:
  smtpd:
    service:
      type: LoadBalancer
      annotations:
        service.beta.kubernetes.io/azure-load-balancer-internal: "true"

  web:
    service:
      type: LoadBalancer
      annotations:
        service.beta.kubernetes.io/azure-load-balancer-internal: "true"

